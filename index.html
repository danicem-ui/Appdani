<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comandero Pro v5.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #1a237e; --bg: #f8fafc; --green-soft: #bbf7d0; --whatsapp: #25d366; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: system-ui, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; position: fixed; width: 100%; color: #000; }
        .card, .btn-action, .mesa-btn, .product-item, .input-box, .btn-calc, .item-venta { border: 1px solid #000 !important; box-shadow: 0 2px 0 rgba(0,0,0,1); }
        .header { background: var(--primary); color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; }
        .view { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); overflow-y: auto; padding: 12px; padding-bottom: 110px; }
        .hidden { display: none !important; }
        .btn-volver { background: var(--green-soft) !important; color: #000 !important; font-weight: 800; border: 1px solid #000 !important; border-radius: 10px; height: 48px; width: 100%; margin: 0; }
        .btn-action { background: white; border-radius: 10px; font-weight: 800; height: 54px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; width: 100%; margin-bottom: 8px; }
        .btn-cocina { background: #ff9800 !important; color: white !important; }
        .btn-primary { background: var(--primary) !important; color: white !important; }
        .btn-success { background: #10b981 !important; color: white !important; }
        .btn-whatsapp { background: var(--whatsapp) !important; color: white !important; border: 1px solid #000 !important; }
        #v-mesas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .mesa-btn { background: white; border-radius: 12px; height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; transition: all 0.3s ease; }
        .mesa-btn.ocupada { background: #fee2e2; border: 2px solid #ef4444 !important; color: #ef4444; }
        .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-calc { background: white; border-radius: 12px; height: 65px; font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px; background: white; border-top: 1px solid #000; z-index: 100; }
        .product-item { background: white; border-radius: 12px; padding: 10px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .input-box { border: 1px solid #000 !important; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="flex flex-col h-screen">
        <header class="header">
            <div>
                <div id="title" class="text-[10px] font-black opacity-70 text-yellow-400 italic uppercase">Servicio</div>
                <div id="total-display" class="text-2xl font-black">0.00 €</div>
            </div>
            <div class="flex gap-2">
                <button onclick="app.addMesa()" class="bg-green-500 w-10 h-10 rounded-full font-black text-xl border border-black">+</button>
                <button onclick="app.verCaja()" class="bg-yellow-500 px-3 py-1 rounded-lg font-black text-[10px] border border-black text-black">CAJA</button>
                <button onclick="router.nav('config')" class="bg-slate-500 px-3 py-1 rounded-lg font-black text-[10px] border border-black text-white">CONF</button>
            </div>
        </header>

        <main class="relative flex-grow overflow-hidden">
            <div id="v-mesas" class="view"></div>
            <div id="v-cats" class="view hidden">
                <div id="cont-cats" class="grid grid-cols-2 gap-3"></div>
                <div id="resumen-comanda" class="card flex-grow overflow-y-auto my-4 p-3 bg-white text-[10px] uppercase font-bold border-dashed border-black"></div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="router.nav('mesas')" class="btn-volver m-0">VOLVER</button>
                    <button onclick="app.enviarCocina()" class="btn-action btn-cocina m-0 text-xs">COCINA</button>
                    <button onclick="calc.open()" class="btn-action btn-primary m-0 text-xs">COBRAR</button>
                </div>
            </div>
            <div id="v-fams" class="view hidden"><button onclick="router.nav('cats')" class="btn-volver">← VOLVER</button><div id="cont-fams" class="grid grid-cols-2 gap-3 mt-2"></div></div>
            <div id="v-prods" class="view hidden"><button onclick="router.nav('fams')" class="btn-volver">← VOLVER</button><div id="cont-prods" class="mt-2"></div><div class="footer-fixed"><button onclick="router.nav('cats')" class="btn-volver">VOLVER AL MENÚ</button></div></div>
            
            <div id="v-cobro" class="view hidden">
                <button onclick="router.nav('cats')" class="btn-volver">← CANCELAR</button>
                <div class="bg-white border-2 border-black rounded-xl p-4 mb-4">
                    <div class="flex justify-between text-xs uppercase opacity-60"><span>Total:</span><span id="c-total-val" class="font-black text-red-600">0.00€</span></div>
                    <div class="flex justify-between text-xl font-black my-2"><span>Paga:</span><span><span id="c-paga">0</span>€</span></div>
                    <hr class="border-black my-2">
                    <div class="flex justify-between text-2xl font-black text-emerald-600"><span>Cambio:</span><span><span id="c-cambio">0.00</span>€</span></div>
                </div>
                <div id="calc-pad" class="calc-grid"></div>
                <div class="footer-fixed"><button onclick="app.generarTicket()" class="btn-action btn-success m-0">FINALIZAR VENTA</button></div>
            </div>

            <div id="v-caja" class="view hidden">
                <button onclick="router.nav('mesas')" class="btn-volver">← VOLVER</button>
                <div id="caja-resumen" class="mb-2"></div>
                <input type="text" id="busc-caja" placeholder="BUSCAR MESA..." oninput="app.renderCaja()" class="input-box p-3 w-full mb-4 uppercase font-bold text-sm">
                <div id="caja-lista"></div>
                <div class="footer-fixed"><button onclick="app.cierreDiario()" class="btn-action bg-red-600 text-white m-0">CIERRE DIARIO</button></div>
            </div>

            <div id="v-detalle-ticket" class="view hidden">
                <button onclick="router.nav('caja')" class="btn-volver">← VOLVER</button>
                <div id="detalle-cont" class="card bg-white p-6 font-mono text-xs mb-4"></div>
                <button onclick="app.abrirPromptWA()" class="btn-action btn-whatsapp">ENVIAR POR WHATSAPP 📱</button>
            </div>

            <div id="v-prompt-wa" class="view hidden bg-black/80 flex items-center justify-center p-4 z-[300]">
                <div class="bg-white p-6 rounded-xl w-full max-w-xs border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <h3 class="text-center font-black mb-4 uppercase text-xs">Teléfono Cliente</h3>
                    <input type="tel" id="in-tel-wa" value="34" class="input-box w-full p-4 text-2xl font-black text-center mb-4 border-2 border-black outline-none">
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="router.nav('detalle-ticket')" class="btn-action bg-gray-200 mb-0 text-xs">VOLVER</button>
                        <button onclick="app.confirmarEnvioWA()" class="btn-action btn-whatsapp mb-0 text-xs">ENVIAR</button>
                    </div>
                </div>
            </div>

            <div id="v-config" class="view hidden">
                <button onclick="router.nav('mesas')" class="btn-volver">← VOLVER</button>
                <div class="card p-4 bg-white mb-4">
                    <input id="in-n" type="text" placeholder="NOMBRE PRODUCTO" class="input-box w-full mb-2 uppercase font-bold text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="in-p" type="number" placeholder="PRECIO €" class="input-box text-sm font-bold">
                        <input id="in-f" type="text" placeholder="FAMILIA" class="input-box uppercase text-sm font-bold">
                    </div>
                    <select id="in-c" class="input-box w-full mt-2 font-bold text-sm bg-white"></select>
                    <button onclick="app.addItem()" class="btn-action btn-success mt-4 mb-0">AÑADIR A CARTA</button>
                </div>
                <button onclick="app.verGestCarta()" class="btn-action">📋 EDITAR PRODUCTOS</button>
                <button onclick="app.verGestCats()" class="btn-action">📂 GESTIÓN CATEGORÍAS</button>
            </div>

            <div id="v-gest-carta" class="view hidden"><button onclick="router.nav('config')" class="btn-volver">← VOLVER</button><div id="list-carta"></div></div>
            <div id="v-gest-cats" class="view hidden">
                <button onclick="router.nav('config')" class="btn-volver">← VOLVER</button>
                <div class="flex gap-2 mb-4">
                    <input id="in-cat-name" type="text" placeholder="NUEVA CAT" class="input-box flex-grow uppercase font-bold">
                    <button onclick="app.addCategory()" class="btn-action mb-0 w-24 btn-success text-[10px]">AÑADIR</button>
                </div>
                <div id="list-cats"></div>
            </div>

            <div id="v-ticket" class="view hidden bg-black/50 flex items-center justify-center p-4 z-[200]">
                <div class="bg-white p-6 rounded-lg w-full max-w-xs border-2 border-black">
                    <div id="t-body" class="font-mono text-[11px]"></div>
                    <button onclick="app.cerrarMesa()" class="btn-action btn-primary mt-6 m-0 w-full">CERRAR MESA</button>
                </div>
            </div>
        </main>
    </div>
    <script>
    const router = {
        nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            const target = document.getElementById('v-' + id);
            if (target) target.classList.remove('hidden');
            window.scrollTo(0, 0);
        }
    };

    const calc = {
        paga: "0",
        open() {
            this.paga = "0";
            const total = parseFloat(document.getElementById('total-display').innerText);
            document.getElementById('c-total-val').innerText = total.toFixed(2) + "€";
            this.render(); router.nav('cobro');
        },
        add(n) {
            if(n === '.') {
                if(!this.paga.includes('.')) {
                    this.paga = this.paga === "0" ? "0." : this.paga + ".";
                }
            } else {
                this.paga = this.paga === "0" ? n.toString() : this.paga + n.toString();
            }
            this.render();
        },
        del() { this.paga = this.paga.length > 1 ? this.paga.slice(0, -1) : "0"; this.render(); },
        render() {
            const total = parseFloat(document.getElementById('c-total-val').innerText);
            document.getElementById('c-paga').innerText = this.paga;
            document.getElementById('c-cambio').innerText = Math.max(0, parseFloat(this.paga) - total).toFixed(2);
        }
    };

    const app = {
        mId: null, vIdxAct: null, tlfCocina: "34674200028",
        db: JSON.parse(localStorage.getItem('v4_db')) || [],
        comandas: JSON.parse(localStorage.getItem('v4_comandas')) || {},
        cats: JSON.parse(localStorage.getItem('v4_cats')) || ["BEBIDAS", "PINCHOS", "RACIONES", "CAFÉ"],
        ventas: JSON.parse(localStorage.getItem('v4_ventas')) || [],
        mesas: JSON.parse(localStorage.getItem('v4_mesas')) || Array.from({length: 12}, (_, i) => ({id: i+1, n: (i+1).toString()})),

        init() { this.renderMesas(); this.refreshSelect(); this.initCalc(); router.nav('mesas'); },
        save(k) { localStorage.setItem('v4_'+k, JSON.stringify(this[k])); },

        renderMesas() { 
            const cont = document.getElementById('v-mesas'); cont.innerHTML = ''; 
            this.mesas.forEach(m => { 
                const ocupada = (this.comandas[m.id] && this.comandas[m.id].length > 0); 
                const btn = document.createElement('button'); 
                btn.className = `mesa-btn ${ocupada ? 'ocupada' : ''}`; 
                btn.innerHTML = `<span class="text-[9px] uppercase font-black opacity-40">Mesa</span><span class="text-xl font-black">${m.n}</span>`; 
                
                let timer;
                const start = () => {
                    timer = setTimeout(() => {
                        const nuevo = prompt("NUEVO NOMBRE:", m.n);
                        if(nuevo) { m.n = nuevo.toUpperCase(); this.save('mesas'); this.renderMesas(); }
                        timer = null;
                    }, 800);
                };
                const end = () => {
                    if(timer) { clearTimeout(timer); timer = null; this.abrirMesa(m); }
                };

                btn.ontouchstart = (e) => { e.preventDefault(); start(); };
                btn.ontouchend = (e) => { e.preventDefault(); end(); };
                btn.onmousedown = start; btn.onmouseup = end;

                cont.appendChild(btn); 
            }); 
        },
        addMesa() { const n = prompt("NOMBRE MESA:"); if(n) { this.mesas.push({id: Date.now(), n: n.toUpperCase()}); this.save('mesas'); this.renderMesas(); } },

        abrirMesa(m) { 
            this.mId = m.id; document.getElementById('title').innerText = "MESA " + m.n;
            if(!this.comandas[this.mId]) this.comandas[this.mId] = [];
            this.updateResumen(); this.renderCats(); router.nav('cats'); 
        },

        renderCats() { document.getElementById('cont-cats').innerHTML = this.cats.map(c => `<button onclick="app.renderFams('${c}')" class="btn-action border-black text-xs">${c}</button>`).join(''); },
        renderFams(cat) {
            const fams = [...new Set(this.db.filter(p => p.c === cat).map(p => p.f))];
            document.getElementById('cont-fams').innerHTML = fams.length ? fams.map(f => `<button onclick="app.renderProds('${cat}','${f}')" class="btn-action bg-blue-50 text-xs">${f}</button>`).join('') : '<div class="p-10 text-center opacity-40 font-bold">SIN FAMILIAS</div>';
            router.nav('fams');
        },
        renderProds(c, f) {
            const cont = document.getElementById('cont-prods'); cont.innerHTML = '';
            this.db.filter(p => p.c === c && p.f === f).forEach(p => {
                const q = this.comandas[this.mId].filter(x => x.id === p.id).length;
                const div = document.createElement('div'); div.className = "product-item";
                div.innerHTML = `<div><b>${p.n}</b><br><small>${p.p.toFixed(2)}€</small></div>
                                 <div class="flex items-center gap-4">
                                    <button onclick="app.qty('${p.id}',-1,'${c}','${f}')" class="w-8 h-8 bg-gray-200 rounded-full font-black border border-black">-</button>
                                    <span class="font-black text-lg">${q}</span>
                                    <button onclick="app.qty('${p.id}',1,'${c}','${f}')" class="w-8 h-8 bg-black text-white rounded-full font-black border border-black">+</button>
                                 </div>`;
                cont.appendChild(div);
            });
            router.nav('prods');
        },
        qty(id, d, c, f) {
            if(d > 0) this.comandas[this.mId].push({...this.db.find(x => x.id === id)});
            else { const i = this.comandas[this.mId].findLastIndex(x => x.id === id); if(i > -1) this.comandas[this.mId].splice(i, 1); }
            this.save('comandas'); this.updateResumen(); this.renderProds(c, f);
        },
        updateResumen() {
            const items = this.comandas[this.mId] || [], total = items.reduce((s, i) => s + i.p, 0);
            document.getElementById('total-display').innerText = total.toFixed(2) + " €";
            const g = items.reduce((a, b) => { a[b.n] = (a[b.n] || 0) + 1; return a; }, {});
            document.getElementById('resumen-comanda').innerHTML = Object.entries(g).map(([n, q]) => `<div class="flex justify-between border-b border-black border-dotted py-1"><span>${n}</span><span>${q}x - ${(q * this.db.find(p => p.n === n)?.p || 0).toFixed(2)}€</span></div>`).join('');
        },
        soloGuardar(e) { e.preventDefault(); router.nav('mesas'); this.renderMesas(); },

        abrirPromptWA() { 
            document.getElementById('in-tel-wa').value = "34";
            router.nav('prompt-wa');
            setTimeout(() => document.getElementById('in-tel-wa').focus(), 300);
        },
        confirmarEnvioWA() {
            const v = this.ventas[this.vIdxAct];
            let tlf = document.getElementById('in-tel-wa').value.replace(/\D/g, '');
            if(tlf.length < 9) { alert("Error"); return; }
            let texto = `*🧾 TICKET: MESA ${v.mesa}*\n_📅 ${v.hora}_\n\`---------------------------\`\n`;
            v.items.forEach(i => texto += `*${i.q}x* ${i.n.toUpperCase()} - ${(i.q*i.p).toFixed(2)}€\n`);
            texto += `\`---------------------------\`\n*TOTAL: ${v.total.toFixed(2)}€*\n\n_¡Gracias!_`;
            window.open(`https://api.whatsapp.com/send?phone=${tlf}&text=${encodeURIComponent(texto)}`, '_blank');
            router.nav('caja');
        },

        verCaja() { if(prompt("PIN:") === "1234") { this.renderCaja(); router.nav('caja'); } },
        renderCaja() {
            const total = this.ventas.reduce((s, v) => s + v.total, 0);
            document.getElementById('caja-resumen').innerHTML = `<div class="bg-black text-yellow-400 p-4 rounded-xl font-black text-center text-xl">TOTAL HOY: ${total.toFixed(2)}€</div>`;
            const filtro = document.getElementById('busc-caja').value.toUpperCase();
            const filtradas = this.ventas.filter(v => v.mesa.includes(filtro));
            document.getElementById('caja-lista').innerHTML = filtradas.slice().reverse().map(v => `
                <div class="item-venta p-4 bg-white mb-2 rounded-lg border border-black flex justify-between items-center" onclick="app.verTicketDetalle(${this.ventas.indexOf(v)})">
                    <div><b>MESA ${v.mesa}</b><br><small class="opacity-50">${v.hora}</small></div>
                    <div class="font-black text-lg">${v.total.toFixed(2)}€</div>
                </div>`).join('');
        },
        verTicketDetalle(idx) {
            this.vIdxAct = idx; const v = this.ventas[idx];
            let h = `<div class="text-center font-black mb-1 underline">DETALLE MESA ${v.mesa}</div><div class="text-center mb-4 text-[10px] opacity-60">${v.hora}</div>`;
            v.items.forEach(i => h += `<div class="flex justify-between py-1 border-b border-gray-100"><span>${i.q}x ${i.n}</span><span>${(i.q*i.p).toFixed(2)}€</span></div>`);
            h += `<hr class="my-2 border-black border-dashed"><div class="flex justify-between font-black text-lg"><span>TOTAL:</span><span>${v.total.toFixed(2)}€</span></div>`;
            document.getElementById('detalle-cont').innerHTML = h; router.nav('detalle-ticket');
        },

        addItem() {
            const n = document.getElementById('in-n').value.toUpperCase(), p = parseFloat(document.getElementById('in-p').value), f = document.getElementById('in-f').value.toUpperCase() || "VARIOS", c = document.getElementById('in-c').value;
            if(n && p) { this.db.push({ id: Date.now().toString(), n, p, f, c }); this.save('db'); this.limpiarForm(); alert("GUARDADO"); }
        },
        verGestCarta() { this.renderCarta(); router.nav('gest-carta'); },
        renderCarta() {
            document.getElementById('list-carta').innerHTML = this.db.length === 0 ? `<div class="p-10 text-center opacity-40 font-bold">VACÍO</div>` : 
            this.db.map((p, i) => `<div class="product-item"><div><b>${p.n}</b><br><small>${p.p.toFixed(2)}€ - ${p.c}</small></div><button onclick="app.borrarProd(${i})" class="text-red-600 font-black">🗑️</button></div>`).join('');
        },
        borrarProd(i) { if(confirm("¿Eliminar?")) { this.db.splice(i, 1); this.save('db'); this.renderCarta(); } },
        verGestCats() { this.renderGestCats(); router.nav('gest-cats'); },
        renderGestCats() {
            document.getElementById('list-cats').innerHTML = this.cats.map((c, i) => `<div class="flex justify-between items-center bg-white p-3 mb-2 border border-black rounded-lg"><b>${c}</b><button onclick="app.borrarCat(${i})" class="text-red-600 font-black">🗑️</button></div>`).join('');
        },
        addCategory() { const n = document.getElementById('in-cat-name').value.toUpperCase(); if(n && !this.cats.includes(n)) { this.cats.push(n); this.save('cats'); this.refreshSelect(); document.getElementById('in-cat-name').value = ''; this.renderGestCats(); } },
        borrarCat(i) { if(confirm("¿Eliminar?")) { this.cats.splice(i, 1); this.save('cats'); this.refreshSelect(); this.renderGestCats(); } },

        limpiarForm() { ['in-n','in-p','in-f'].forEach(id => document.getElementById(id).value = ""); },
        refreshSelect() { document.getElementById('in-c').innerHTML = this.cats.map(c => `<option value="${c}">${c}</option>`).join(''); },
        initCalc() {
            const pad = document.getElementById('calc-pad'); pad.innerHTML = '';
            [1,2,3,4,5,6,7,8,9,'.','0','C'].forEach(v => {
                const b = document.createElement('button'); b.className = "btn-calc"; b.innerText = v;
                b.onclick = () => v === 'C' ? calc.del() : calc.add(v); pad.appendChild(b);
            });
        },
        generarTicket() {
            const items = this.comandas[this.mId] || []; if(!items.length) return;
            const total = items.reduce((s, i) => s + i.p, 0), mN = this.mesas.find(x => x.id === this.mId).n;
            const g = items.reduce((a, b) => { if(!a[b.n]) a[b.n] = {n: b.n, q: 0, p: b.p}; a[b.n].q++; return a; }, {});
            this.ventas.push({ mesa: mN, total, hora: new Date().toLocaleString(), items: Object.values(g) });
            this.save('ventas'); let t = `<div class="text-center font-black underline mb-4 text-sm uppercase">Mesa ${mN}</div>`;
            Object.values(g).forEach(i => t += `<div class="flex justify-between py-1"><span>${i.q}x ${i.n}</span><span>${(i.q*i.p).toFixed(2)}€</span></div>`);
            t += `<hr class="my-2 border-black"><b>TOTAL: ${total.toFixed(2)}€</b>`;
            document.getElementById('t-body').innerHTML = t; router.nav('ticket');
        },
        cerrarMesa() { 
            this.comandas[this.mId] = []; 
            this.save('comandas'); 
            this.renderMesas();
            document.getElementById('total-display').innerText = "0.00 €";
            router.nav('mesas'); 
        },
        cierreDiario() { if(confirm("¿Borrar historial?")) { this.ventas = []; this.save('ventas'); this.renderCaja(); } },

        enviarCocina() {
            const items = this.comandas[this.mId] || [];
            if (!items.length) return;
            const catsCocina = ["RACIONES", "TAPAS", "PINCHOS", "BOCADILLOS", "ENSALADAS", "ALMUERZO", "PLATO COMBINADO", "POSTRES", "MENÚ DEL DÍA"];
            const filtrados = items.filter(i => catsCocina.includes(i.c.toUpperCase()));
            if (!filtrados.length) { alert("Solo bebidas/otros (No va a cocina)"); return; }
            const g = filtrados.reduce((a, b) => { a[b.n] = (a[b.n] || 0) + 1; return a; }, {});
            let t = `*🔥 PEDIDO COCINA - MESA ${this.mesas.find(x => x.id === this.mId).n}*\n`;
            Object.entries(g).forEach(([n, q]) => t += `- ${q}x ${n}\n`);
            window.open(`https://api.whatsapp.com/send?phone=${this.tlfCocina}&text=${encodeURIComponent(t)}`, '_blank');
